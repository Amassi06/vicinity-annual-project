# Compose DEV — Connected Neighbours
# Lancer depuis la racine du repo avec le Makefile (`make up`).
# Ce fichier ne contient que les bases. Le backend/frontend arriveront aux Épices 2+.

name: ${COMPOSE_PROJECT_NAME:-cn-dev}

networks:
  cn_backend:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  neo4j_data:
  neo4j_logs:
  minio_data:

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: cn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [cn_backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo:
    image: mongo:7.0
    container_name: cn-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "${MONGO_HOST_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    networks: [cn_backend]
    healthcheck:
      test:
        - CMD
        - mongosh
        - --quiet
        - -u
        - ${MONGO_INITDB_ROOT_USERNAME}
        - -p
        - ${MONGO_INITDB_ROOT_PASSWORD}
        - --authenticationDatabase
        - admin
        - --eval
        - "db.adminCommand('ping').ok"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  neo4j:
    image: neo4j:5.20-community
    container_name: cn-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "${NEO4J_HTTP_HOST_PORT}:7474"
      - "${NEO4J_BOLT_HOST_PORT}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks: [cn_backend]
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: cn-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_HOST_PORT}:9000"
      - "${MINIO_CONSOLE_HOST_PORT}:9001"
    volumes:
      - minio_data:/data
    networks: [cn_backend]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
