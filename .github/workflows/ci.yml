name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: cn_app
          POSTGRES_PASSWORD: cn_dev_password
          POSTGRES_DB: connected_neighbours
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U cn_app -d connected_neighbours"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mongo:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: cn_root
          MONGO_INITDB_ROOT_PASSWORD: cn_dev_password
        ports:
          - 57017:27017
        options: >-
          --health-cmd "mongosh -u cn_root -p cn_dev_password --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      neo4j:
        image: neo4j:5.20-community
        env:
          NEO4J_AUTH: neo4j/cn_dev_password
        ports:
          - 57687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p cn_dev_password 'RETURN 1'"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend
        working-directory: backend
        run: npm ci

      - name: Prisma migrate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://cn_app:cn_dev_password@localhost:55432/connected_neighbours?schema=public
        run: npx prisma migrate deploy

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Test
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://cn_app:cn_dev_password@localhost:55432/connected_neighbours?schema=public
          MONGO_URL: mongodb://cn_root:cn_dev_password@localhost:57017/connected_neighbours?authSource=admin
          NEO4J_URL: bolt://localhost:57687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: cn_dev_password
        run: npm test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: web-client build
        working-directory: web-client
        run: npm ci && npm run build

      - name: web-admin build
        working-directory: web-admin
        run: npm ci && npm run build

  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle build
        working-directory: desktop-client
        run: ./gradlew build --no-daemon
